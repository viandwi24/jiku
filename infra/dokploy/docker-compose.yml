services:
  # ─────────────────────────────────────────────
  # PostgreSQL
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dokploy-network

  # ─────────────────────────────────────────────
  # RustFS (S3-compatible object storage)
  # ─────────────────────────────────────────────
  rustfs:
    image: rustfs/rustfs:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY}
    expose:
      - "9000"
      - "9001"
    volumes:
      - rustfs_data:/data
    networks:
      - dokploy-network
    labels:
      # RustFS console routed via Traefik (optional — configure domain via Dokploy UI instead)
      - "traefik.enable=true"
      - "traefik.http.routers.rustfs-console.rule=Host(`${RUSTFS_CONSOLE_DOMAIN}`)"
      - "traefik.http.routers.rustfs-console.entrypoints=web"
      - "traefik.http.services.rustfs-console.loadbalancer.server.port=9001"

  # ─────────────────────────────────────────────
  # Browser (Chromium with CDP)
  # ─────────────────────────────────────────────
  browser:
    image: lscr.io/linuxserver/chromium:latest
    restart: unless-stopped
    shm_size: 1gb
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-Etc/UTC}
    expose:
      - "3000"  # noVNC web UI
      - "9222"  # CDP (direct, internal only)
      - "9223"  # CDP proxy — app connect via http://browser:9223
    volumes:
      - browser_init:/custom-cont-init.d
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jiku-browser.rule=Host(`${BROWSER_DOMAIN}`)"
      - "traefik.http.routers.jiku-browser.entrypoints=web"
      - "traefik.http.services.jiku-browser.loadbalancer.server.port=3000"

  # ─────────────────────────────────────────────
  # App — server (Bun) + web (Next.js) via supervisord
  # ─────────────────────────────────────────────
  app:
    build:
      context: ../..
      dockerfile: infra/dokploy/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rustfs:
        condition: service_started
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      # RustFS / S3
      S3_ENDPOINT: http://rustfs:9000
      S3_ACCESS_KEY: ${RUSTFS_ACCESS_KEY}
      S3_SECRET_KEY: ${RUSTFS_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET:-jiku}
      # Browser CDP
      BROWSER_CDP_URL: http://browser:9223
      # Server
      PORT: ${SERVER_PORT:-3001}
      JWT_SECRET: ${JWT_SECRET}
      # Web (Next.js)
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    expose:
      - "${SERVER_PORT:-3001}"   # server (Express/Bun)
      - "3000"                   # web (Next.js)
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      # Server API
      - "traefik.http.routers.jiku-api.rule=Host(`${API_DOMAIN}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.jiku-api.entrypoints=websecure"
      - "traefik.http.routers.jiku-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.jiku-api.loadbalancer.server.port=${SERVER_PORT:-3001}"
      # Web UI
      - "traefik.http.routers.jiku-web.rule=Host(`${WEB_DOMAIN}`)"
      - "traefik.http.routers.jiku-web.entrypoints=websecure"
      - "traefik.http.routers.jiku-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.jiku-web.loadbalancer.server.port=3000"

volumes:
  postgres_data:
  rustfs_data:
  browser_init:

networks:
  dokploy-network:
    external: true
