services:
  # ─────────────────────────────────────────────
  # Headless Chrome (CDP + noVNC viewer)
  # Used by the built-in `jiku.browser.vercel` adapter.
  # ─────────────────────────────────────────────
  chrome:
    build:
      context: ../../../packages/browser/docker
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - SCREEN_WIDTH=1920
      - SCREEN_HEIGHT=1080
      - SCREEN_DEPTH=24
      - CDP_PORT=9222
      - NOVNC_PORT=6080
    shm_size: "2gb"
    volumes:
      - chrome-data:/data/chrome-data
    ports:
      - "${CHROME_CDP_PORT:-9222}:9222"    # CDP — ws://localhost:9222
      - "${CHROME_NOVNC_PORT:-6080}:6080"  # noVNC viewer — http://localhost:6080

  # ─────────────────────────────────────────────
  # CamoFox — Firefox-based anti-fingerprint browser (REST API, port 9377)
  # Used by the `jiku.camofox` plugin adapter.
  # Docs: https://github.com/jo-inc/camofox-browser
  # ─────────────────────────────────────────────
  camofox:
    # Built from @jiku/camofox — a self-contained Dockerfile that clones
    # jo-inc/camofox-browser at build time and runs its REST server. Override
    # the upstream ref via CAMOFOX_REF (defaults to `master`).
    build:
      context: ../../../packages/camofox/docker
      dockerfile: Dockerfile
      args:
        CAMOFOX_REF: ${CAMOFOX_REF:-master}
    restart: unless-stopped
    environment:
      - CAMOFOX_PORT=9377
      - CAMOFOX_API_KEY=${CAMOFOX_API_KEY:-}
      - CAMOFOX_ADMIN_KEY=${CAMOFOX_ADMIN_KEY:-}
      - MAX_SESSIONS=${CAMOFOX_MAX_SESSIONS:-20}
      - MAX_TABS_PER_SESSION=${CAMOFOX_MAX_TABS_PER_SESSION:-10}
      - SESSION_TIMEOUT_MS=${CAMOFOX_SESSION_TIMEOUT_MS:-1800000}
      - BROWSER_IDLE_TIMEOUT_MS=${CAMOFOX_IDLE_TIMEOUT_MS:-300000}
      - PROXY_HOST=${CAMOFOX_PROXY_HOST:-}
      - PROXY_PORT=${CAMOFOX_PROXY_PORT:-}
      - PROXY_USERNAME=${CAMOFOX_PROXY_USERNAME:-}
      - PROXY_PASSWORD=${CAMOFOX_PROXY_PASSWORD:-}
    shm_size: "2gb"
    volumes:
      # Cookie import directory — documented path per CamoFox README:
      #   https://github.com/jo-inc/camofox-browser (default cookies dir,
      #   overridable via CAMOFOX_COOKIES_DIR). Upstream example mounts this
      #   read-only, but we keep it writable so cookies dropped in via the
      #   REST import endpoint survive container restarts.
      - camofox-cookies:/home/node/.camofox/cookies
      # App-data volume for anything the server writes under /data.
      - camofox-data:/data/camofox
    ports:
      - "${CAMOFOX_PORT:-9377}:9377"   # REST API — http://localhost:9377

volumes:
  chrome-data:
  camofox-data:
  camofox-cookies:
