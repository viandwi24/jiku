# nginx config for the @jiku/browser CDP proxy.
#
# Why this exists: chromium's DevTools HTTP handler enforces a DNS rebinding
# protection — it rejects /json/* requests whose Host header is not
# `localhost`, `127.0.0.1`, or an IP address. When the chrome container is
# accessed from another docker service (e.g. the Studio app container) by
# its compose service hostname (`bitorex-...-chrome-1`), the inbound Host
# header would be that hostname and chromium would respond with:
#
#     "Host header is specified and is not an IP address or localhost."
#
# This nginx instance sits in front of chromium's internal debug port
# (127.0.0.1:19222) and unconditionally rewrites the Host header to
# "localhost" before forwarding. WebSocket upgrades are passed through so
# that agent-browser's CDP WebSocket (which is opened on
# /devtools/browser/<uuid> after the /json/version discovery call) also
# works.

worker_processes 1;
error_log /var/log/jiku-browser/nginx-error.log warn;
pid /run/nginx-jiku.pid;

events {
  worker_connections 256;
}

http {
  # CDP traffic is chatty — keep access logs off to avoid disk pressure.
  access_log off;

  # WebSocket upgrade plumbing.
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  server {
    listen 9222 default_server;
    listen [::]:9222 default_server;
    server_name _;

    location / {
      proxy_pass http://127.0.0.1:19222;
      proxy_http_version 1.1;

      # The whole point of this proxy. Chromium will accept any of:
      #   - localhost[:port]
      #   - 127.0.0.1[:port]
      #   - any IPv4/IPv6 literal
      # We force "localhost" so the inbound hostname (which is whatever the
      # caller's docker service alias is) doesn't matter.
      proxy_set_header Host "localhost";

      # WebSocket upgrade — required for the CDP WebSocket connection that
      # agent-browser opens after fetching /json/version.
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;

      # CDP WebSocket connections are long-lived. Disable timeouts so they
      # don't get reaped mid-session.
      proxy_read_timeout 86400;
      proxy_send_timeout 86400;
    }
  }
}
