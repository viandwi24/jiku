services:
  browser:
    image: lscr.io/linuxserver/chromium:latest
    shm_size: 1gb
    ports:
      - "4000:3000"
      - "4001:3001"
      - "3010:3010"   # noVNC web UI — http://localhost:3010
      - "9222:9223"   # CDP via proxy — http://localhost:9222
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - ./browser-init/chromium-cdp.sh:/custom-cont-init.d/chromium-cdp.sh:ro
    # To connect from Jiku Studio:
    #   mode: remote
    #   cdp_url: http://localhost:9222
    #
    # noVNC desktop: http://localhost:4000
